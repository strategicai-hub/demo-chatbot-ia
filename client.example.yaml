# ============================================================
# DADOS DO NEGOCIO - Preencha com as informacoes do cliente
# Copie este arquivo para client.yaml e edite os valores.
# ============================================================

# Nicho do negocio - define qual prompt em app/prompts/{niche}.j2
# e usado pela IA. Nichos suportados estao em app/prompts/.
# Observacao: o nicho tambem e detectado dinamicamente a partir
# da mensagem inicial do lead (ex.: "Olá! Procuro um pet shop..."
# -> petshop). O valor abaixo e apenas o fallback quando a
# mensagem nao casa com nenhuma regra.
niche: "petshop"

business:
  name: "Pet Shop Exemplo"
  address: "Rua Exemplo, 123 - Cidade-UF"

assistant:
  name: "Luna"
  # greeting é injetado dinamicamente pelo código (prompt.py) com base no
  # horário de São Paulo: "bom dia" / "boa tarde" / "boa noite". Qualquer
  # valor informado aqui é ignorado — deixe em branco ou omita o campo.
  greeting: ""

payment:
  methods:
    - "crédito"
    - "PIX"
    - "boleto"

differentials:
  - "Atendimento Humanizado"

# Midias que a IA pode enviar via tags no prompt.
# Formato: "[TAG]": {url: "https://...", type: "image|document|video"}
media: {}
