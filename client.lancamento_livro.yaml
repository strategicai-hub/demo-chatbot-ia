communication_humanizada:
  what_is: >
    A Comunicação Humanizada, também chamada de Neurocomunicação, não é apenas
    uma técnica de oratória ou sobre falar bonito. É um campo de estudo que une
    neurociência, psicologia, sociologia, antropologia e semiótica para entender
    como o cérebro humano escuta, interpreta, reage e decide diante de uma
    mensagem.
  objectives:
    - "Restaurar a conexão humana, com respeito, escuta e empatia mesmo quando há diferenças."
    - "Reduzir conflitos e transformar conversas difíceis em pontes de entendimento."
    - "Promover diálogo real, saindo do encontro de monólogos para uma troca com crescimento mútuo."
    - "Melhorar ambientes familiares, profissionais e sociais, com mais saúde mental, segurança psicológica e relações saudáveis."
  book_topics:
    - "Como o cérebro escuta, interpreta, reage e decide diante de uma mensagem."
    - "Escuta, empatia e respeito como base para restaurar conexões humanas."
    - "Caminhos para reduzir conflitos e transformar conversas difíceis em pontes."
    - "Segurança psicológica e relações mais saudáveis em empresas, famílias e sociedade."

