version: "3.8"

x-common-env: &common-env
  - PROJECT_SLUG=${PROJECT_SLUG}
  - BUSINESS_NAME=${BUSINESS_NAME}
  - ASSISTANT_NAME=${ASSISTANT_NAME}
  - ACTIVE_NICHE=${ACTIVE_NICHE}
  - ADMIN_PHONES=${ADMIN_PHONES}
  - RABBITMQ_HOST=${RABBITMQ_HOST}
  - RABBITMQ_PORT=${RABBITMQ_PORT}
  - RABBITMQ_USER=${RABBITMQ_USER}
  - RABBITMQ_PASS=${RABBITMQ_PASS}
  - RABBITMQ_VHOST=${RABBITMQ_VHOST}
  - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
  - REDIS_HOST=${REDIS_HOST}
  - REDIS_PORT=${REDIS_PORT}
  - REDIS_PASSWORD=${REDIS_PASSWORD}
  - GEMINI_API_KEY=${GEMINI_API_KEY}
  - UAZAPI_BASE_URL=${UAZAPI_BASE_URL}
  - UAZAPI_TOKEN=${UAZAPI_TOKEN}
  - UAZAPI_INSTANCE=${UAZAPI_INSTANCE}
  - WEBHOOK_PATH=${WEBHOOK_PATH}
  - DEBOUNCE_SECONDS=${DEBOUNCE_SECONDS}
  - BLOCK_TTL_SECONDS=${BLOCK_TTL_SECONDS}
  - BLOCK_ON_FROM_ME=${BLOCK_ON_FROM_ME:-false}
  - FORM_WEBHOOK_SECRET=${FORM_WEBHOOK_SECRET}
  - EVENT_REMINDERS_ENABLED=${EVENT_REMINDERS_ENABLED:-true}
  - EVENT_REMINDER_POLL_SECONDS=${EVENT_REMINDER_POLL_SECONDS:-60}
  - ALERT_PHONE=${ALERT_PHONE}
  - DEBOUNCE_BYPASS_PHONES=${DEBOUNCE_BYPASS_PHONES}
  - ALLOWED_PHONES=${ALLOWED_PHONES}
  - BLOCKED_SENDER_PHONES=${BLOCKED_SENDER_PHONES}
  - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON}
  - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
  - SAI_BASE_URL=${SAI_BASE_URL:-https://comercial.strategicai.com.br}
  - SAI_TENANT_SLUG=${SAI_TENANT_SLUG}
  - SAI_INGEST_SECRET=${SAI_INGEST_SECRET}
  - SAI_CHATBOT_SLUG=${SAI_CHATBOT_SLUG:-demo-chatbot-ia}
  - SAI_CHATBOT_NAME=${SAI_CHATBOT_NAME:-Demo Chatbot IA}
  - SAI_CHATBOT_PUBLIC_URL=${SAI_CHATBOT_PUBLIC_URL:-https://webhook-whatsapp.strategicai.com.br/demo-chatbot-ia}
  - SAI_REGISTRATION_TOKEN=${SAI_REGISTRATION_TOKEN}

services:
  demo-chatbot-ia-api:
    image: ghcr.io/strategicai-hub/demo-chatbot-ia:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - network_public
    environment: *common-env
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.demo-chatbot-ia.rule=Host(`webhook-whatsapp.strategicai.com.br`) && PathPrefix(`/demo-chatbot-ia`)"
        - "traefik.http.routers.demo-chatbot-ia.entrypoints=websecure"
        - "traefik.http.routers.demo-chatbot-ia.tls=true"
        - "traefik.http.routers.demo-chatbot-ia.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.demo-chatbot-ia.loadbalancer.server.port=8000"

  demo-chatbot-ia-worker:
    image: ghcr.io/strategicai-hub/demo-chatbot-ia:latest
    command: python worker.py
    networks:
      - network_public
    environment: *common-env
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s

networks:
  network_public:
    external: true
